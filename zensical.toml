[project]
site_name = "devcontainer-python-template"
site_description = "Add your description here"
repo_name = "HYP3R00T/devcontainer-python-template"
repo_url = "https://github.com/HYP3R00T/devcontainer-python-template"
site_author = "Rajesh Das"
copyright = "Copyright &copy; 2026 Rajesh Das"

nav = [
  { Home = "index.md" },
  { Dev = [
    { Setup = "dev/setup/index.md" },
    { "Template Setup" = "dev/setup/from-template.md" },
    { Resources = "dev/resources.md" },
    { Contributing = [
      { "Authoring Documentation" = "dev/contributing/authoring-documentation.md" },
      { "Naming Conventions" = "dev/contributing/naming-conventions.md" },
      { "Documentation Principles" = [
        { "Principle 1: No Fiction" = "dev/contributing/documentation-principles/principle-1-no-fiction.md" },
        { "Principle 2: Single Responsibility" = "dev/contributing/documentation-principles/principle-2-single-responsibility.md" },
        { "Principle 3: Scale by Folders" = "dev/contributing/documentation-principles/principle-3-scale-by-folders.md" },
        { "Principle 4: Link to Code" = "dev/contributing/documentation-principles/principle-4-link-to-code.md" },
        { "Principle 5: Format & Style" = "dev/contributing/documentation-principles/principle-5-format-style.md" },
        { "Principle 6: Structure Uniformity" = "dev/contributing/documentation-principles/principle-6-structure-uniformity.md" },
      ] },
    ] },
    { Testing = [
      { "Unit Tests" = "dev/testing/unit-tests.md" },
      { "Integration Tests" = "dev/testing/integration-tests.md" },
      { "Optional Markers" = "dev/testing/optional-markers.md" },
      { "Property Tests" = "dev/testing/property-tests.md" },
    ] },
  ] },
]

[project.theme]
language = "en"
features = [
  "announce.dismiss",
  "content.action.edit",
  "content.action.view",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.instant.progress",
  "navigation.path",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]

# Palette toggle for automatic mode
[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

# Palette toggle for light mode
[[project.theme.palette]]
scheme = "default"
media = "(prefers-color-scheme: light)"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

# Palette toggle for dark mode
[[project.theme.palette]]
scheme = "slate"
media = "(prefers-color-scheme: dark)"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.theme.icon]
logo = "lucide/layout-template"
next = "lucide/arrow-right"
previous = "lucide/arrow-left"
search = "lucide/search"
top = "lucide/arrow-up"
edit = "lucide/file-pen-line"
view = "lucide/file-braces-corner"

[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
