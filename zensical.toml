          { "Leave Capacity Gate" = "packages/shiftcraft-core/constraints/hard/leave-capacity-gate.md" },
          { "Core Shift Balance" = "packages/shiftcraft-core/constraints/hard/core-shift-balance.md" },
        ] },
        { "Soft Constraints" = [
          { Overview = "packages/shiftcraft-core/constraints/soft/index.md" },
          { "Shift Balance" = "packages/shiftcraft-core/constraints/soft/shift-balance.md" },
          { "Shift Block Stability" = "packages/shiftcraft-core/constraints/soft/shift-block-stability.md" },
          { "History Bias" = "packages/shiftcraft-core/constraints/soft/history-bias.md" },
