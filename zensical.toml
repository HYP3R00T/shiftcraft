        { "Principle 3: Scale by Folders" = "dev/contributing/documentation-principles/principle-3-scale-by-folders.md" },
        { "Principle 4: Link to Code" = "dev/contributing/documentation-principles/principle-4-link-to-code.md" },
        { "Principle 5: Format & Style" = "dev/contributing/documentation-principles/principle-5-format-style.md" },
