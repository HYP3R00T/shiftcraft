          { "Date-Range Override" = "packages/shiftcraft-core/constraints/hard/date-range-override.md" },
          { "Regular Shift Order" = "packages/shiftcraft-core/constraints/hard/regular-shift-order.md" },
          { "Typed Leave Honored" = "packages/shiftcraft-core/constraints/hard/typed-leave-honored.md" },
          { "Leave on Requested Dates" = "packages/shiftcraft-core/constraints/hard/leave-on-requested-dates.md" },
