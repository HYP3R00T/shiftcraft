          { "Two Offs Per Week" = "packages/shiftcraft-core/constraints/hard/two-offs-per-week.md" },
          { "Min Shift Coverage" = "packages/shiftcraft-core/constraints/hard/min-shift-coverage.md" },
          { "Max Shift Coverage" = "packages/shiftcraft-core/constraints/hard/max-shift-coverage.md" },
