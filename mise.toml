[tools]
python = "3.13"
uv = "latest"
ty = "latest"
ruff = "latest"
prek = "latest"
gitleaks = "latest"
shellcheck = "latest"
pnpm = "latest"

[settings]
experimental = true
python.uv_venv_auto = "source"
idiomatic_version_file_enable_tools = ["python"]

[hooks]
enter = "bash ./scripts/enter_project.sh"

[env]
_.file = '.env'         # for sensitive data
UV_LINK_MODE = "copy"
_.python.venv = ".venv"

[shell_alias]
pya = "source ./.venv/bin/activate"

[tasks.docs]
run = "zensical serve --dev-addr 0.0.0.0:8000"
description = "Serve the documentation locally"

[tasks.test]
run = "pytest --cov=shiftcraft_core --cov-report=term-missing --cov-fail-under=80"
description = "Run fast tests with coverage report for all packages (fails under 80%)"

[tasks.sync]
run = "uv sync --all-packages"
description = "Sync all workspace packages and dependencies"

[tasks.docker]
run = "docker compose up --build"
description = "Run docker compose"
